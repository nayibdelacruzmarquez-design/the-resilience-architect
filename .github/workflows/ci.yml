name: CI Pipeline - The Resilience Architect

# Elige qué eventos disparan este flujo de trabajo
on:
  push:
    branches: [ "main", "develop", "entrega-final-*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Descarga el código del repositorio en el servidor de GitHub
    - name: Checkout del código
      uses: actions/checkout@v4

    # 2. Configura el entorno de Python
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. Instala las dependencias del proyecto
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest pytest-asyncio
        sudo apt-get update
        sudo apt-get install -y libegl1 libgl1-mesa-dev libglx-mesa0

    # 4. PASO CRUCIAL: Verificación de código limpio con Ruff
    - name: Ejecutar Linter (Ruff)
      run: ruff check .

    # 5. Ejecución de Pruebas Unitarias Asíncronas
    - name: Ejecutar Pruebas con Pytest
      run: pytest